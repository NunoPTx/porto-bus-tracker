name: Hourly Bus Check
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python tracker.py
      - name: Save results
        run: |
          git config --global user.name 'BusTrackerBot'
          git config --global user.email 'bot@noreply.github.com'
          git add roster.json
          git commit -m "Update bus roster" || exit 0
          git push
